spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  jwt-secret: ${JWT_SECRET}
  jwt-expiration-ms: ${JWT_EXPIRATION_MS:36000000}

  jwt-refresh-secret: ${JWT_REFRESH_SECRET}
  jwt-refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS}

  opengraph:
    allowed-domains:
      github.com,
      gitlab.com,
      npmjs.com,
      pypi.org,
      docker.com,
      docker.io,
      medium.com,
      dev.to,
      hashnode.com,
      stackoverflow.com,
      x.com,
      twitter.com,
      linkedin.com,
      reddit.com,
      youtube.com,
      youtu.be,
      twitch.tv,
      wikipedia.org,
      notion.so,
      readthedocs.io,
      docs.google.com,
      nytimes.com,
      bbc.com,
      lemonde.fr,
      theverge.com,
      techcrunch.com,
      figma.com,
      canva.com,
      alexandr-e.vercel.app

  logo:
    dev-key: ${LOGO_DEV_KEY}

  flyway:
    enabled: true
    locations: classpath:db/migration